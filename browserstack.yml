# BrowserStack credentials
userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

# Project reporting
projectName: BrowserStack Assignment
buildName: elpais-scraper
buildIdentifier: '#${BUILD_NUMBER}'

# Test framework
framework: pytest

# Platforms to run tests on
platforms:
  - os: Windows
    osVersion: 11
    browserName: Chrome
    browserVersion: latest

  - os: OS X
    osVersion: Sonoma
    browserName: Safari
    browserVersion: latest

  - os: Windows
    osVersion: 11
    browserName: Edge
    browserVersion: latest

  - deviceName: iPhone 14
    osVersion: 16
    browserName: Safari
    deviceOrientation: portrait

  - deviceName: Samsung Galaxy S23
    osVersion: 13.0
    browserName: Chrome
    deviceOrientation: portrait

# Parallel runs per platform
parallelsPerPlatform: 1

# Local testing (for private / localhost sites)
browserstackLocal: false

# Debugging
debug: false
networkLogs: true
consoleLogs: info